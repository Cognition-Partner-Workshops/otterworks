# ETL Configuration
# SECURITY: Secrets MUST be provided via environment variables.
# See .env.example for the full list of required variables.
# This file contains ONLY non-sensitive configuration.

[aws]
region = us-east-1

[database]
host = analytics-db.internal.otterworks.dev
port = 5432
database = otterworks_analytics

[services]
document_service_url = http://document-service:8083
file_service_url = http://file-service:8082
meilisearch_url = http://meilisearch:7700

[s3]
data_lake_bucket = otterworks-data-lake
file_storage_bucket = otterworks-file-storage
quarantine_bucket = otterworks-file-quarantine
archive_bucket = otterworks-audit-archive
analytics_prefix = analytics/daily
