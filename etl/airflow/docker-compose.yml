version: '3.8'
x-airflow-common:
  image: apache/airflow:2.8.1-python3.12
  environment: &id001
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW__CORE__PLUGINS_FOLDER: /opt/airflow/plugins
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__WEBSERVER__SECRET_KEY: otterworks-dev-secret-key
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    AWS_DEFAULT_REGION: us-east-1
    AWS_ACCESS_KEY_ID: test
    AWS_SECRET_ACCESS_KEY: test
    AWS_ENDPOINT_URL: http://localstack:4566
  volumes: &id002
  - ./dags:/opt/airflow/dags
  - ./plugins:/opt/airflow/plugins
  - ./config:/opt/airflow/config
  - ./logs:/opt/airflow/logs
  depends_on: &id003
    postgres:
      condition: service_healthy
    localstack:
      condition: service_healthy
  security_opt:
  - no-new-privileges:true
  read_only: true
  tmpfs:
  - /tmp
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
    - 5433:5432
    volumes:
    - postgres-data:/var/lib/postgresql/data
    - ./config/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U airflow
      interval: 5s
      timeout: 5s
      retries: 5
    security_opt:
    - no-new-privileges:true
    read_only: true
    tmpfs:
    - /tmp
  localstack:
    image: localstack/localstack:3.1
    ports:
    - 4566:4566
    environment:
      SERVICES: s3,sqs,dynamodb
      DEFAULT_REGION: us-east-1
    volumes:
    - localstack-data:/var/lib/localstack
    healthcheck:
      test:
      - CMD-SHELL
      - awslocal s3 ls || exit 1
      interval: 5s
      timeout: 5s
      retries: 10
    security_opt:
    - no-new-privileges:true
    read_only: true
    tmpfs:
    - /tmp
  airflow-init:
    image: apache/airflow:2.8.1-python3.12
    environment: *id001
    volumes: *id002
    depends_on: *id003
    entrypoint: /bin/bash
    command:
    - -c
    - "airflow db init\nairflow users create \\\n  --username admin \\\n  --firstname\
      \ Admin \\\n  --lastname User \\\n  --role Admin \\\n  --email admin@otterworks.dev\
      \ \\\n  --password admin\n# Create AWS connection pointing to LocalStack\nairflow\
      \ connections add aws_default \\\n  --conn-type aws \\\n  --conn-extra '{\"\
      endpoint_url\": \"http://localstack:4566\", \"region_name\": \"us-east-1\"}'\
      \ \\\n  || true\n# Create Postgres connection for analytics\nairflow connections\
      \ add otterworks_postgres \\\n  --conn-type postgres \\\n  --conn-host postgres\
      \ \\\n  --conn-port 5432 \\\n  --conn-login airflow \\\n  --conn-password airflow\
      \ \\\n  --conn-schema airflow \\\n  || true\n"
    restart: 'no'
    security_opt:
    - no-new-privileges:true
    read_only: true
    tmpfs:
    - /tmp
  airflow-webserver:
    image: apache/airflow:2.8.1-python3.12
    environment: *id001
    volumes: *id002
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: airflow webserver --port 8080
    ports:
    - 8080:8080
    healthcheck:
      test:
      - CMD-SHELL
      - curl -f http://localhost:8080/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    security_opt:
    - no-new-privileges:true
    read_only: true
    tmpfs:
    - /tmp
  airflow-scheduler:
    image: apache/airflow:2.8.1-python3.12
    environment: *id001
    volumes: *id002
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: airflow scheduler
    healthcheck:
      test:
      - CMD-SHELL
      - airflow jobs check --job-type SchedulerJob --hostname $(hostname) || exit
        1
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    security_opt:
    - no-new-privileges:true
    read_only: true
    tmpfs:
    - /tmp
volumes:
  postgres-data: null
  localstack-data: null
