default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>
  host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>
  port: <%= ENV.fetch("DATABASE_PORT", 5432) %>
  username: <%= ENV.fetch("DATABASE_USER", "otterworks") %>
  # Static password for the default/revert path. When DB_IAM_AUTH_ENABLED=true a
  # fresh RDS IAM token is injected per physical connection by
  # config/initializers/aurora_iam_auth.rb (tokens expire ~15 min).
  password: <%= AuroraAuth.static_password %>
  sslmode: <%= AuroraAuth.sslmode %>

development:
  <<: *default
  database: admin_service_development

test:
  <<: *default
  database: admin_service_test

production:
  <<: *default
  database: admin_service_production
