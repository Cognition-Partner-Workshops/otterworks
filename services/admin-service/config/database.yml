default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>
  host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>
  port: <%= ENV.fetch("DATABASE_PORT", 5432) %>
  username: <%= ENV.fetch("DATABASE_USER", "otterworks") %>
  # Static password, or a short-lived Aurora IAM token when DB_IAM_AUTH_ENABLED=true.
  password: <%= AuroraAuth.database_password %>
  sslmode: <%= AuroraAuth.sslmode %>

development:
  <<: *default
  database: admin_service_development

test:
  <<: *default
  database: admin_service_test

production:
  <<: *default
  database: admin_service_production
