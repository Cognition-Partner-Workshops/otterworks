default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>
  host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>
  port: <%= ENV.fetch("DATABASE_PORT", 5432) %>
  username: <%= ENV.fetch("DATABASE_USER", "otterworks") %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", "otterworks") %>
  # Aurora Serverless v2 resilience (scale-to-zero resume). connect_timeout
  # bounds the wake-up wait; checkout_timeout bounds pool checkout. Defaults
  # match the RDS before-state; deploy-dev.sh raises them when DB_BACKEND=aurora.
  connect_timeout: <%= ENV.fetch("DATABASE_CONNECT_TIMEOUT", 5).to_i %>
  checkout_timeout: <%= ENV.fetch("DATABASE_CHECKOUT_TIMEOUT", 5).to_i %>

development:
  <<: *default
  database: admin_service_development

test:
  <<: *default
  database: admin_service_test

production:
  <<: *default
  database: admin_service_production
