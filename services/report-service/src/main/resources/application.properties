# OtterWorks Report Service Configuration
# LEGACY: .properties file instead of .yml (older Spring Boot convention)

server.port=8091

# Application info
spring.application.name=report-service
info.app.name=OtterWorks Report Service
info.app.version=0.1.0

# Database (PostgreSQL)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:otterworks_reports}
spring.datasource.username=${DB_USER:otterworks}
spring.datasource.password=${DB_PASSWORD:otterworks_dev}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# LEGACY: SpringFox requires this workaround for Spring Boot 2.6+ path matching
spring.mvc.pathmatch.matching-strategy=ant-path-matcher

# Actuator
# nosemgrep: java.spring.security.audit.spring-actuator-non-health-enabled.spring-actuator-dangerous-endpoints-enabled
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=when-authorized

# Service URLs
otterworks.analytics-service.url=${ANALYTICS_SERVICE_URL:http://analytics-service:8088}
otterworks.audit-service.url=${AUDIT_SERVICE_URL:http://audit-service:8090}
otterworks.auth-service.url=${AUTH_SERVICE_URL:http://auth-service:8081}

# Report settings
otterworks.report.output-dir=${REPORT_OUTPUT_DIR:/tmp/reports}
otterworks.report.max-rows=${REPORT_MAX_ROWS:50000}
otterworks.report.connection-timeout=5000
otterworks.report.read-timeout=30000

# Logging
logging.level.com.otterworks=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
