# OtterWorks Report Service — Lambda deployment overlay (namespace: lam1)
#
# Loaded ONLY when the "lambda" Spring profile is active, which happens solely
# through com.otterworks.report.lambda.StreamLambdaHandler (the serverless entry
# point). The default profile used by the always-on EKS pod / docker-compose and
# by `main` never activates this file, so the before-state is unchanged.
#
# Why: the report entity persists error_message as an @Lob. On PostgreSQL,
# Hibernate reads @Lob values through the JDBC large-object API, which the
# driver rejects when the connection is in auto-commit mode
# ("Large Objects may not be used in auto-commit mode"). The EKS servlet path
# only avoided this by luck of timing (the report had not yet transitioned to
# FAILED when it was read). Under Lambda the read reliably hits a populated
# @Lob and 502s. This is a connection-layer fix (no entity, SQL, business-logic,
# or contract change): start pooled connections with auto-commit disabled so
# large-object reads succeed, exactly as they must on Lambda + RDS.
spring.datasource.hikari.auto-commit=false
