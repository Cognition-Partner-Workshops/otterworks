# Additive 'aurora' profile for the report service.
#
# Enable with SPRING_PROFILES_ACTIVE=aurora to route the existing
# DB_HOST/DB_PORT/DB_NAME connection through the AWS Advanced JDBC Wrapper with
# IAM database authentication + TLS. The base application.properties datasource
# (password-based RDS PostgreSQL) is left intact for revert — just drop this
# profile to switch back.
spring.datasource.url=jdbc:aws-wrapper:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:otterworks_reports}
spring.datasource.driver-class-name=software.amazon.jdbc.Driver
spring.datasource.hikari.data-source-properties.wrapperPlugins=iam
spring.datasource.hikari.data-source-properties.ssl=true
spring.datasource.hikari.data-source-properties.sslmode=${DB_SSLMODE:require}
spring.datasource.hikari.data-source-properties.sslrootcert=${DB_SSL_ROOT_CERT:}
