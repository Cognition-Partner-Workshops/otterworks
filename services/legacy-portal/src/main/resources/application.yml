server:
  port: 8095

spring:
  application:
    name: legacy-portal
  # Default profile: embedded H2 with ONE SCHEMA PER BOUNDED CONTEXT. The schema
  # boundaries (announcements / user_preferences / feedback) are the decomposition seams —
  # each could become its own database when the monolith is split into services.
  datasource:
    url: 'jdbc:h2:mem:legacyportal;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;INIT=CREATE SCHEMA IF NOT EXISTS ANNOUNCEMENTS\;CREATE SCHEMA IF NOT EXISTS USER_PREFERENCES\;CREATE SCHEMA IF NOT EXISTS FEEDBACK'
    username: sa
    password: ''
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

---
# On-prem / VM profile: talks to a real PostgreSQL running alongside the app on the VM
# (see docker-compose.onprem.yml and scripts/run-onprem.sh). The three schemas are created
# by scripts/initdb.sql at database init time.
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/legacyportal}
    username: ${SPRING_DATASOURCE_USERNAME:legacyportal}
    password: ${SPRING_DATASOURCE_PASSWORD:legacyportal}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
