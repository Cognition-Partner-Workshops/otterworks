# On-prem / VM deployment profile for legacy-portal.
#
# This is the "runs on a VM today" story: a plain Docker Compose stack (app + a local
# PostgreSQL) that a team would run on an on-prem host or a single VM. It is deliberately
# SEPARATE from the repo's Helm/EKS deploy path (scripts/deploy-dev.sh) — legacy-portal is the
# rehost ("lift-and-shift to EC2") and monolith-decomposition "before" state, so it is not part
# of the golden app's cluster deployment.
#
#   Usage (from services/legacy-portal/):
#     docker compose -f docker-compose.onprem.yml up --build
#     curl http://localhost:8095/health
#     docker compose -f docker-compose.onprem.yml down -v
services:
  legacy-portal-db:
    image: postgres:15-alpine
    container_name: legacy-portal-db
    environment:
      POSTGRES_DB: legacyportal
      POSTGRES_USER: legacyportal
      POSTGRES_PASSWORD: ${DB_PASSWORD:-legacyportal}
    volumes:
      - ./scripts/initdb.sql:/docker-entrypoint-initdb.d/initdb.sql:ro
      - legacy-portal-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legacyportal -d legacyportal"]
      interval: 5s
      timeout: 5s
      retries: 10

  legacy-portal:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: legacy-portal
    depends_on:
      legacy-portal-db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://legacy-portal-db:5432/legacyportal
      SPRING_DATASOURCE_USERNAME: legacyportal
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-legacyportal}
    ports:
      - "8095:8095"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8095/health"]
      interval: 10s
      timeout: 5s
      start_period: 40s
      retries: 5

volumes:
  legacy-portal-db-data:
