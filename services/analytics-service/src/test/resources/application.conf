akka {
  loglevel = "WARNING"
  http {
    server {
      idle-timeout = 60s
      request-timeout = 30s
    }
  }
}

analytics {
  server {
    host = "0.0.0.0"
    port = 8088
  }
  s3 {
    data-lake-bucket = "test-data-lake"
  }
  sqs {
    events-queue-url = "http://localhost:4566/000000000000/test-analytics-events"
  }
  aws {
    region = "us-east-1"
  }
  postgres {
    url = "jdbc:postgresql://localhost:5432/test_analytics"
    user = "test"
    password = "test"
    max-pool-size = 2
  }
}
