akka {
  loglevel = "INFO"
  loggers = ["akka.event.slf4j.Slf4jLogger"]
  logging-filter = "akka.event.slf4j.Slf4jLoggingFilter"
  http {
    server {
      idle-timeout = 60s
      request-timeout = 30s
    }
  }
}

analytics {
  server {
    host = "0.0.0.0"
    host = ${?ANALYTICS_HOST}
    port = 8088
    port = ${?PORT}
  }
  s3 {
    data-lake-bucket = "otterworks-data-lake"
    data-lake-bucket = ${?S3_DATA_LAKE_BUCKET}
  }
  sqs {
    events-queue-url = "http://localhost:4566/000000000000/otterworks-analytics-events"
    events-queue-url = ${?SQS_ANALYTICS_QUEUE_URL}
  }
  aws {
    region = "us-east-1"
    region = ${?AWS_REGION}
    endpoint-url = ${?AWS_ENDPOINT_URL}
  }
  repository {
    # Durable PostgreSQL store by default (golden app). Set to "in-memory" for
    # local runs or tests that have no database available, or "iceberg" to use
    # the S3 + Apache Iceberg lakehouse backend (the RE-ARCHITECT "after").
    backend = "postgres"
    backend = ${?ANALYTICS_REPOSITORY_BACKEND}
  }
  # S3 + Apache Iceberg lakehouse backend (used only when repository.backend =
  # "iceberg"). Defaults derive the warehouse and Athena output from the existing
  # analytics.s3.data-lake-bucket, so this backend is wired through the same
  # config the golden app already exposes.
  iceberg {
    # Iceberg warehouse root: s3://<data-lake-bucket>/iceberg in the cloud, or a
    # file:// path for local runs / the reconciliation harness.
    warehouse = "s3://"${analytics.s3.data-lake-bucket}"/iceberg"
    warehouse = ${?ANALYTICS_ICEBERG_WAREHOUSE}
    # "glue" (AWS Glue Data Catalog) or "hadoop" (local file catalog).
    catalog = "glue"
    catalog = ${?ANALYTICS_ICEBERG_CATALOG}
    database = "otterworks_analytics"
    database = ${?ANALYTICS_ICEBERG_DATABASE}
    table = "analytics_events"
    table = ${?ANALYTICS_ICEBERG_TABLE}
    athena {
      # When true, reads go through Amazon Athena over the Glue-cataloged table;
      # otherwise a direct Iceberg table scan is used.
      enabled = false
      enabled = ${?ANALYTICS_ICEBERG_ATHENA_ENABLED}
      workgroup = "primary"
      workgroup = ${?ANALYTICS_ICEBERG_ATHENA_WORKGROUP}
      output-location = "s3://"${analytics.s3.data-lake-bucket}"/athena-results/"
      output-location = ${?ANALYTICS_ICEBERG_ATHENA_OUTPUT_LOCATION}
      database = ${analytics.iceberg.database}
      database = ${?ANALYTICS_ICEBERG_ATHENA_DATABASE}
    }
  }
  postgres {
    # Connection is assembled from POSTGRES_* (compose) unless DATABASE_URL is
    # given explicitly (deploy-dev.sh wiring). DATABASE_* always takes precedence.
    host = "localhost"
    host = ${?POSTGRES_HOST}
    port = 5432
    port = ${?POSTGRES_PORT}
    database = "otterworks_analytics"
    database = ${?POSTGRES_DB}
    url = "jdbc:postgresql://"${analytics.postgres.host}":"${analytics.postgres.port}"/"${analytics.postgres.database}
    url = ${?DATABASE_URL}
    user = "otterworks"
    user = ${?POSTGRES_USER}
    user = ${?DATABASE_USER}
    password = "otterworks"
    password = ${?POSTGRES_PASSWORD}
    password = ${?DATABASE_PASSWORD}
    max-pool-size = 10
    max-pool-size = ${?DATABASE_MAX_POOL_SIZE}
  }
}
