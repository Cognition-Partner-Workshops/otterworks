akka {
  loglevel = "INFO"
  loggers = ["akka.event.slf4j.Slf4jLogger"]
  logging-filter = "akka.event.slf4j.Slf4jLoggingFilter"
  http {
    server {
      idle-timeout = 60s
      request-timeout = 30s
    }
  }
}

analytics {
  server {
    host = "0.0.0.0"
    host = ${?ANALYTICS_HOST}
    port = 8088
    port = ${?PORT}
  }
  s3 {
    data-lake-bucket = "otterworks-data-lake"
    data-lake-bucket = ${?S3_DATA_LAKE_BUCKET}
  }
  sqs {
    events-queue-url = "http://localhost:4566/000000000000/otterworks-analytics-events"
    events-queue-url = ${?SQS_ANALYTICS_QUEUE_URL}
  }
  aws {
    region = "us-east-1"
    region = ${?AWS_REGION}
    endpoint-url = ${?AWS_ENDPOINT_URL}
  }
  repository {
    # Durable PostgreSQL store by default (golden app). Set to "in-memory" for
    # local runs or tests that have no database available.
    backend = "postgres"
    backend = ${?ANALYTICS_REPOSITORY_BACKEND}
  }
  postgres {
    # Connection is assembled from POSTGRES_* (compose) unless DATABASE_URL is
    # given explicitly (deploy-dev.sh wiring). DATABASE_* always takes precedence.
    host = "localhost"
    host = ${?POSTGRES_HOST}
    port = 5432
    port = ${?POSTGRES_PORT}
    database = "otterworks_analytics"
    database = ${?POSTGRES_DB}
    url = "jdbc:postgresql://"${analytics.postgres.host}":"${analytics.postgres.port}"/"${analytics.postgres.database}
    url = ${?DATABASE_URL}
    user = "otterworks"
    user = ${?POSTGRES_USER}
    user = ${?DATABASE_USER}
    password = "otterworks"
    password = ${?POSTGRES_PASSWORD}
    password = ${?DATABASE_PASSWORD}
    max-pool-size = 10
    max-pool-size = ${?DATABASE_MAX_POOL_SIZE}
    # Aurora IAM authentication + TLS (opt-in; defaults preserve the RDS path).
    # When iam-auth-enabled is true the static password above is replaced by a
    # short-lived RDS IAM token generated per physical connection; ssl-mode
    # controls TLS (e.g. "require", "verify-full").
    iam-auth-enabled = false
    iam-auth-enabled = ${?DB_IAM_AUTH_ENABLED}
    ssl-mode = ""
    ssl-mode = ${?DB_SSL_MODE}
    ssl-root-cert = ""
    ssl-root-cert = ${?DB_SSL_ROOT_CERT}
    iam-region = ${analytics.aws.region}
    iam-region = ${?DB_IAM_REGION}
  }
}
