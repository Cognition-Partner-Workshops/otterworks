akka {
  loglevel = "INFO"
  loggers = ["akka.event.slf4j.Slf4jLogger"]
  logging-filter = "akka.event.slf4j.Slf4jLoggingFilter"
  http {
    server {
      idle-timeout = 60s
      request-timeout = 30s
    }
  }
}

analytics {
  server {
    host = "0.0.0.0"
    host = ${?ANALYTICS_HOST}
    port = 8088
    port = ${?PORT}
  }
  s3 {
    data-lake-bucket = "otterworks-data-lake"
    data-lake-bucket = ${?S3_DATA_LAKE_BUCKET}
  }
  sqs {
    enabled = true
    enabled = ${?ANALYTICS_SQS_ENABLED}
    events-queue-url = "http://localhost:4566/000000000000/otterworks-analytics-events"
    events-queue-url = ${?SQS_ANALYTICS_QUEUE_URL}
  }
  aws {
    region = "us-east-1"
    region = ${?AWS_REGION}
    endpoint-url = ${?AWS_ENDPOINT_URL}
  }
  repository {
    # PostgreSQL remains the golden default. "iceberg" is opt-in.
    backend = "postgres"
    backend = ${?ANALYTICS_REPOSITORY_BACKEND}
  }
  iceberg {
    mode = "athena"
    mode = ${?ANALYTICS_ICEBERG_MODE}
    database = "otterworks_analytics_ice1"
    database = ${?ANALYTICS_ICEBERG_DATABASE}
    events-table = "analytics_events_ice1"
    events-table = ${?ANALYTICS_ICEBERG_EVENTS_TABLE}
    aggregates-table = "analytics_daily_metrics_ice1"
    aggregates-table = ${?ANALYTICS_ICEBERG_AGGREGATES_TABLE}
    athena-workgroup = "otterworks-analytics-ice1"
    athena-workgroup = ${?ANALYTICS_ATHENA_WORKGROUP}
    athena-output = "s3://otterworks-analytics-iceberg-ice1/query-results/"
    athena-output = ${?ANALYTICS_ATHENA_OUTPUT}
    warehouse = "s3://otterworks-analytics-iceberg-ice1/warehouse/"
    warehouse = ${?ANALYTICS_ICEBERG_WAREHOUSE}
    local-warehouse = ".analytics-iceberg-ice1"
    local-warehouse = ${?ANALYTICS_ICEBERG_LOCAL_WAREHOUSE}
  }
  postgres {
    # Connection is assembled from POSTGRES_* (compose) unless DATABASE_URL is
    # given explicitly (deploy-dev.sh wiring). DATABASE_* always takes precedence.
    host = "localhost"
    host = ${?POSTGRES_HOST}
    port = 5432
    port = ${?POSTGRES_PORT}
    database = "otterworks_analytics"
    database = ${?POSTGRES_DB}
    url = "jdbc:postgresql://"${analytics.postgres.host}":"${analytics.postgres.port}"/"${analytics.postgres.database}
    url = ${?DATABASE_URL}
    user = "otterworks"
    user = ${?POSTGRES_USER}
    user = ${?DATABASE_USER}
    password = "otterworks"
    password = ${?POSTGRES_PASSWORD}
    password = ${?DATABASE_PASSWORD}
    max-pool-size = 10
    max-pool-size = ${?DATABASE_MAX_POOL_SIZE}
  }
}
