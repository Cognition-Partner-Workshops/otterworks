server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/otterworks}
    username: ${SPRING_DATASOURCE_USERNAME:otterworks}
    password: ${SPRING_DATASOURCE_PASSWORD:otterworks_dev}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  secret: ${JWT_SECRET:dev-jwt-secret-otterworks-2024-change-in-production}
  access-token-expiry: 3600
  refresh-token-expiry: 604800

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.otterworks: DEBUG
    org.springframework.security: INFO
  pattern:
    console: '{"timestamp":"%d{ISO8601}","level":"%level","service":"auth-service","logger":"%logger","message":"%msg","trace_id":"%X{traceId}","span_id":"%X{spanId}"}%n'
