server:
  port: 8081

spring:
  application:
    name: auth-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/otterworks}
    username: ${SPRING_DATASOURCE_USERNAME:otterworks}
    password: ${SPRING_DATASOURCE_PASSWORD:otterworks_dev}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

jwt:
  secret: ${JWT_SECRET:dev-jwt-secret-otterworks-2024-change-in-production}
  access-token-expiry: ${JWT_ACCESS_TOKEN_EXPIRY:3600}
  refresh-token-expiry: ${JWT_REFRESH_TOKEN_EXPIRY:2592000}

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: prometheus,info
      path-mapping:
        prometheus: metrics
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: auth-service

logging:
  level:
    com.otterworks: INFO
    org.springframework.security: WARN
