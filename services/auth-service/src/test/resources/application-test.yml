spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

jwt:
  secret: test-jwt-secret-otterworks-must-be-at-least-32-bytes-long-for-hmac
  access-token-expiry: 3600
  refresh-token-expiry: 2592000

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: prometheus,info
      path-mapping:
        prometheus: metrics

logging:
  level:
    com.otterworks: DEBUG
    org.springframework.security: DEBUG
