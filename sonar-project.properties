sonar.projectKey=Cognition-Partner-Workshops_otterworks
sonar.projectName=OtterWorks
sonar.organization=cognition-partner-workshops

# Polyglot monorepo — 11 backend services + 2 frontends
sonar.sources=services,frontend
sonar.sourceEncoding=UTF-8

# Exclude build artifacts, dependencies, and generated files
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/target/**,\
  **/.gradle/**,\
  **/coverage/**,\
  **/__pycache__/**,\
  **/vendor/**,\
  **/bin/**,\
  **/obj/**,\
  infrastructure/**,\
  scripts/**,\
  tests/**,\
  **/*.lock,\
  **/package-lock.json,\
  **/Cargo.lock,\
  **/poetry.lock,\
  **/Gemfile.lock

# Test directories
sonar.tests=services,frontend
sonar.test.inclusions=\
  **/*_test.go,\
  **/test_*.py,\
  **/*.test.ts,\
  **/*.test.js,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.js,\
  **/tests/**,\
  **/__tests__/**,\
  **/test/**,\
  **/spec/**
