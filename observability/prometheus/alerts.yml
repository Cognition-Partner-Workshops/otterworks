groups:
  # -----------------------------------------------------------
  # Service Availability Alerts
  # -----------------------------------------------------------
  - name: otterworks.service.availability
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: >-
            {{ $labels.job }} on instance {{ $labels.instance }} has been
            unreachable for more than 1 minute.
          runbook_url: https://docs.otterworks.dev/runbooks/service-down

      - alert: ServiceHighRestartRate
        expr: changes(process_start_time_seconds[15m]) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Service {{ $labels.job }} is restarting frequently"
          description: >-
            {{ $labels.job }} has restarted more than 2 times in the last
            15 minutes.

  # -----------------------------------------------------------
  # HTTP Error Rate Alerts
  # -----------------------------------------------------------
  - name: otterworks.http.errors
    rules:
      - alert: HighErrorRate
        expr: >-
          (
            sum by (job) (rate(http_requests_total{status=~"5.."}[5m]))
            /
            sum by (job) (rate(http_requests_total[5m]))
          ) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High 5xx error rate on {{ $labels.job }}"
          description: >-
            {{ $labels.job }} is returning more than 5% server errors
            (current value: {{ $value | humanizePercentage }}).
          runbook_url: https://docs.otterworks.dev/runbooks/high-error-rate

      - alert: HighClientErrorRate
        expr: >-
          (
            sum by (job) (rate(http_requests_total{status=~"4.."}[5m]))
            /
            sum by (job) (rate(http_requests_total[5m]))
          ) > 0.25
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High 4xx error rate on {{ $labels.job }}"
          description: >-
            {{ $labels.job }} is returning more than 25% client errors
            (current value: {{ $value | humanizePercentage }}).

  # -----------------------------------------------------------
  # Latency Alerts
  # -----------------------------------------------------------
  - name: otterworks.http.latency
    rules:
      - alert: HighLatencyP99
        expr: >-
          histogram_quantile(0.99,
            sum by (job, le) (rate(http_request_duration_seconds_bucket[5m]))
          ) > 2
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "P99 latency above 2s on {{ $labels.job }}"
          description: >-
            The 99th percentile latency for {{ $labels.job }} has exceeded
            2 seconds for the last 5 minutes
            (current value: {{ $value | humanizeDuration }}).
          runbook_url: https://docs.otterworks.dev/runbooks/high-latency

      - alert: HighLatencyP95
        expr: >-
          histogram_quantile(0.95,
            sum by (job, le) (rate(http_request_duration_seconds_bucket[5m]))
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P95 latency above 1s on {{ $labels.job }}"
          description: >-
            The 95th percentile latency for {{ $labels.job }} has exceeded
            1 second (current value: {{ $value | humanizeDuration }}).

  # -----------------------------------------------------------
  # Resource Usage Alerts
  # -----------------------------------------------------------
  - name: otterworks.resources
    rules:
      - alert: HighMemoryUsage
        expr: >-
          (
            process_resident_memory_bytes
            /
            machine_memory_bytes
          ) > 0.80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.job }}"
          description: >-
            {{ $labels.job }} on {{ $labels.instance }} is using more than
            80% of available memory
            (current: {{ $value | humanizePercentage }}).
          runbook_url: https://docs.otterworks.dev/runbooks/high-memory

      - alert: HighMemoryUsageCritical
        expr: >-
          (
            process_resident_memory_bytes
            /
            machine_memory_bytes
          ) > 0.90
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical memory usage on {{ $labels.job }}"
          description: >-
            {{ $labels.job }} on {{ $labels.instance }} is using more than
            90% of available memory
            (current: {{ $value | humanizePercentage }}).

      - alert: HighCPUUsage
        expr: >-
          rate(process_cpu_seconds_total[5m]) > 0.80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.job }}"
          description: >-
            {{ $labels.job }} on {{ $labels.instance }} CPU usage is above
            80% for the last 5 minutes.

      - alert: LowDiskSpace
        expr: >-
          (
            node_filesystem_avail_bytes{mountpoint="/"}
            /
            node_filesystem_size_bytes{mountpoint="/"}
          ) < 0.15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space on {{ $labels.instance }}"
          description: >-
            Less than 15% disk space remaining on {{ $labels.instance }}
            mountpoint {{ $labels.mountpoint }}
            (available: {{ $value | humanizePercentage }}).
          runbook_url: https://docs.otterworks.dev/runbooks/low-disk-space

      - alert: CriticalDiskSpace
        expr: >-
          (
            node_filesystem_avail_bytes{mountpoint="/"}
            /
            node_filesystem_size_bytes{mountpoint="/"}
          ) < 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical disk space on {{ $labels.instance }}"
          description: >-
            Less than 5% disk space remaining on {{ $labels.instance }}.

  # -----------------------------------------------------------
  # AWS / SQS Alerts
  # -----------------------------------------------------------
  - name: otterworks.aws.sqs
    rules:
      - alert: SQSQueueDepthHigh
        expr: aws_sqs_approximate_number_of_messages_visible > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "SQS queue depth too high: {{ $labels.queue_name }}"
          description: >-
            The SQS queue {{ $labels.queue_name }} has more than 1000
            messages visible (current: {{ $value }}). Messages may not be
            processing fast enough.
          runbook_url: https://docs.otterworks.dev/runbooks/sqs-queue-depth

      - alert: SQSQueueDepthCritical
        expr: aws_sqs_approximate_number_of_messages_visible > 5000
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "SQS queue critically backed up: {{ $labels.queue_name }}"
          description: >-
            The SQS queue {{ $labels.queue_name }} has more than 5000
            messages visible.

      - alert: SQSDLQNotEmpty
        expr: >-
          aws_sqs_approximate_number_of_messages_visible{queue_name=~".*-dlq"} > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Dead letter queue has messages: {{ $labels.queue_name }}"
          description: >-
            The dead letter queue {{ $labels.queue_name }} contains
            {{ $value }} messages that require investigation.

  # -----------------------------------------------------------
  # AWS / DynamoDB Alerts
  # -----------------------------------------------------------
  - name: otterworks.aws.dynamodb
    rules:
      - alert: DynamoDBThrottling
        expr: >-
          sum by (table_name) (
            rate(aws_dynamodb_throttled_requests_total[5m])
          ) > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "DynamoDB throttling on table {{ $labels.table_name }}"
          description: >-
            DynamoDB table {{ $labels.table_name }} is experiencing throttled
            requests. Consider increasing provisioned capacity or switching
            to on-demand mode.
          runbook_url: https://docs.otterworks.dev/runbooks/dynamodb-throttling

      - alert: DynamoDBHighLatency
        expr: >-
          aws_dynamodb_successful_request_latency_average{operation=~"GetItem|PutItem|Query"} > 50
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "DynamoDB high latency on {{ $labels.table_name }}"
          description: >-
            DynamoDB {{ $labels.operation }} on table
            {{ $labels.table_name }} has average latency above 50ms.

      - alert: DynamoDBSystemErrors
        expr: >-
          sum by (table_name) (
            rate(aws_dynamodb_system_errors_total[5m])
          ) > 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "DynamoDB system errors on {{ $labels.table_name }}"
          description: >-
            DynamoDB table {{ $labels.table_name }} is reporting system
            errors.

  # -----------------------------------------------------------
  # Collaboration Service Alerts
  # -----------------------------------------------------------
  - name: otterworks.collaboration
    rules:
      - alert: WebSocketConnectionsHigh
        expr: collab_active_connections > 5000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High WebSocket connection count"
          description: >-
            The collaboration service has {{ $value }} active WebSocket
            connections, which is above the 5000 threshold.

      - alert: CRDTSyncDelayHigh
        expr: >-
          histogram_quantile(0.99,
            sum by (le) (rate(collab_crdt_sync_duration_seconds_bucket[5m]))
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CRDT sync delay is high"
          description: >-
            The P99 CRDT sync delay is above 1 second, which may degrade
            the real-time editing experience.
