global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

  external_labels:
    cluster: otterworks-dev
    environment: development

rule_files:
  - alerts.yml
  - recording_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  # -------------------------------------------------------
  # Prometheus self-monitoring
  # -------------------------------------------------------
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # -------------------------------------------------------
  # Backend Services (15s scrape interval)
  # -------------------------------------------------------
  - job_name: api-gateway
    scrape_interval: 15s
    metrics_path: /metrics
    static_configs:
      - targets: ["api-gateway:8080"]
        labels:
          service: api-gateway
          language: go
          tier: gateway
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: "(.+):\\d+"
        replacement: "${1}"

  - job_name: auth-service
    scrape_interval: 15s
    metrics_path: /metrics
    static_configs:
      - targets: ["auth-service:8081"]
        labels:
          service: auth-service
          language: java
          tier: backend
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: "(.+):\\d+"
        replacement: "${1}"

  - job_name: file-service
    scrape_interval: 15s
    metrics_path: /metrics
    static_configs:
      - targets: ["file-service:8082"]
        labels:
