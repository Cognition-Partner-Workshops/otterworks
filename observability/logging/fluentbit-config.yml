# Fluent Bit Configuration for OtterWorks
#
# Collects JSON-formatted logs from all services, enriches them
# with service metadata, and forwards to CloudWatch Logs.

[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     info
    Parsers_File  parsers.conf
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020
    Health_Check  On

# ---------------------------------------------------------------
# Inputs: Collect logs from each service container
# ---------------------------------------------------------------
[INPUT]
    Name              tail
    Tag               service.api-gateway
    Path              /var/log/containers/api-gateway*.log
    Parser            docker_json
    Refresh_Interval  5
    Mem_Buf_Limit     10MB
    Skip_Long_Lines   On

[INPUT]
    Name              tail
    Tag               service.auth-service
    Path              /var/log/containers/auth-service*.log
    Parser            docker_json
    Refresh_Interval  5
    Mem_Buf_Limit     10MB
    Skip_Long_Lines   On

[INPUT]
    Name              tail
    Tag               service.file-service
    Path              /var/log/containers/file-service*.log
    Parser            docker_json
    Refresh_Interval  5
    Mem_Buf_Limit     10MB
    Skip_Long_Lines   On

[INPUT]
    Name              tail
    Tag               service.document-service
    Path              /var/log/containers/document-service*.log
    Parser            docker_json
    Refresh_Interval  5
    Mem_Buf_Limit     10MB
    Skip_Long_Lines   On

[INPUT]
    Name              tail
    Tag               service.collab-service
    Path              /var/log/containers/collab-service*.log
    Parser            docker_json
    Refresh_Interval  5
    Mem_Buf_Limit     10MB
    Skip_Long_Lines   On

[INPUT]
    Name              tail
    Tag               service.notification-service
    Path              /var/log/containers/notification-service*.log
    Parser            docker_json
    Refresh_Interval  5
    Mem_Buf_Limit     10MB
    Skip_Long_Lines   On

[INPUT]
    Name              tail
    Tag               service.search-service
    Path              /var/log/containers/search-service*.log
    Parser            docker_json
    Refresh_Interval  5
    Mem_Buf_Limit     10MB
    Skip_Long_Lines   On

[INPUT]
    Name              tail
    Tag               service.analytics-service
    Path              /var/log/containers/analytics-service*.log
    Parser            docker_json
    Refresh_Interval  5
    Mem_Buf_Limit     10MB
    Skip_Long_Lines   On

[INPUT]
    Name              tail
    Tag               service.admin-service
    Path              /var/log/containers/admin-service*.log
    Parser            docker_json
    Refresh_Interval  5
    Mem_Buf_Limit     10MB
    Skip_Long_Lines   On

[INPUT]
    Name              tail
    Tag               service.audit-service
    Path              /var/log/containers/audit-service*.log
    Parser            docker_json
    Refresh_Interval  5
    Mem_Buf_Limit     10MB
    Skip_Long_Lines   On

# ---------------------------------------------------------------
# Filters: Parse JSON body and add metadata
# ---------------------------------------------------------------
[FILTER]
    Name          parser
    Match         service.*
    Key_Name      log
    Parser        otterworks_json
    Reserve_Data  On
    Preserve_Key  On

[FILTER]
    Name          modify
    Match         service.api-gateway
    Add           service api-gateway
    Add           tier gateway
    Add           environment development

[FILTER]
    Name          modify
    Match         service.auth-service
    Add           service auth-service
    Add           tier backend
    Add           environment development

[FILTER]
    Name          modify
    Match         service.file-service
    Add           service file-service
    Add           tier backend
    Add           environment development

[FILTER]
    Name          modify
    Match         service.document-service
    Add           service document-service
    Add           tier backend
    Add           environment development

[FILTER]
    Name          modify
    Match         service.collab-service
    Add           service collab-service
    Add           tier backend
    Add           environment development

[FILTER]
    Name          modify
    Match         service.notification-service
    Add           service notification-service
    Add           tier backend
    Add           environment development

[FILTER]
    Name          modify
    Match         service.search-service
    Add           service search-service
    Add           tier backend
    Add           environment development

[FILTER]
    Name          modify
    Match         service.analytics-service
    Add           service analytics-service
    Add           tier backend
    Add           environment development

[FILTER]
    Name          modify
    Match         service.admin-service
    Add           service admin-service
    Add           tier backend
    Add           environment development

[FILTER]
    Name          modify
    Match         service.audit-service
    Add           service audit-service
    Add           tier backend
    Add           environment development

# ---------------------------------------------------------------
# Output: Forward to CloudWatch Logs (via LocalStack in dev)
# ---------------------------------------------------------------
[OUTPUT]
    Name              cloudwatch_logs
    Match             service.*
    region            us-east-1
    log_group_name    /otterworks/${TAG[1]}
    log_stream_prefix from-fluent-bit-
    auto_create_group On
    endpoint          http://localstack:4566

[OUTPUT]
    Name              stdout
    Match             service.*
    Format            json_lines
