apiVersion: 1

datasources:
  - name: Prometheus
    uid: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 15s
      httpMethod: POST

  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
    editable: false
    jsonData:
      tracesToMetrics:
        datasourceUid: Prometheus
        tags:
          - key: service.name
            value: service

  # Note: Loki datasource is not provisioned because no Loki service
  # is deployed. The logging pipeline uses Fluent Bit -> CloudWatch
  # (via LocalStack). Add a Loki service to docker-compose.infra.yml
  # and uncomment below if Grafana-based log querying is desired.
  #
  # - name: Loki
  #   type: loki
  #   access: proxy
  #   url: http://loki:3100
  #   editable: false
  #   jsonData:
  #     derivedFields:
  #       - datasourceUid: Jaeger
  #         matcherRegex: "trace_id=(\\w+)"
  #         name: TraceID
  #         url: "$${__value.raw}"
