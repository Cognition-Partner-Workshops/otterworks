[pytest]
markers =
    api_flow: black-box API flow tests that run against OTTERWORKS_API_BASE_URL or http://localhost:8080
    gap_revealer: tests that intentionally expose missing routes, auth gaps, or incomplete cross-service behavior
    side_effect: cross-service eventual-consistency and async fanout tests
    websocket: Socket.IO/WebSocket collaboration tests
    degradation: resilience tests that require controlled service outage or degraded infrastructure
