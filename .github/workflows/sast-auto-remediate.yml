name: SAST Auto-Remediation

# Event-driven security pipeline with two trigger paths:
#
#   1. Trivy (pull_request):
#      PR opened by human → Trivy scan → findings? → Devin API → auto-fix → re-scan
#
#   2. SonarCloud (check_run):
#      PR analyzed by SonarCloud → quality gate fails → Devin API → auto-fix → re-scan
#
# Bot-loop prevention: skips PRs authored by devin-ai-integration[bot].
# Escalation: after MAX_FIX_ATTEMPTS, opens an issue for human review.

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]
  check_run:
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: read

env:
  TRIVY_VERSION: "0.71.0"
  MAX_FIX_ATTEMPTS: 5
  SEVERITY_THRESHOLD: "CRITICAL,HIGH"

# ─────────────────────────────────────────────────────────────
#  Path 1: Trivy dependency scan (pull_request trigger)
# ─────────────────────────────────────────────────────────────

jobs:
  sast-scan:
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.user.login != 'devin-ai-integration[bot]'
    runs-on: ubuntu-latest
    outputs:
      has_findings: ${{ steps.parse.outputs.has_findings }}
      findings_summary: ${{ steps.parse.outputs.findings_summary }}
      attempt_count: ${{ steps.counter.outputs.attempt_count }}
      exceeded_max: ${{ steps.counter.outputs.exceeded_max }}
    steps:
      - uses: actions/checkout@v4

      - name: Count prior fix attempts
        id: counter
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ATTEMPT_COUNT=$(gh api \
            "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/commits?per_page=100" \
            --jq '[.[] | select(.author.login == "devin-ai-integration[bot]")] | length')
          echo "attempt_count=${ATTEMPT_COUNT}" >> "$GITHUB_OUTPUT"
          if [ "$ATTEMPT_COUNT" -ge "${{ env.MAX_FIX_ATTEMPTS }}" ]; then
            echo "exceeded_max=true" >> "$GITHUB_OUTPUT"
          else
            echo "exceeded_max=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin v${{ env.TRIVY_VERSION }}

      - name: Run Trivy filesystem scan
        run: |
          trivy fs . \
            --severity "${{ env.SEVERITY_THRESHOLD }}" \
            --format json \
            --output trivy-results.json \
            --skip-dirs services/report-service \
            --ignorefile .trivyignore \
            || true

      - name: Parse findings
        id: parse
        run: |
          VULN_COUNT=$(jq '[.Results[]? | .Vulnerabilities // [] | length] | add // 0' trivy-results.json)
          echo "Total HIGH/CRITICAL findings: $VULN_COUNT"

          if [ "$VULN_COUNT" -eq 0 ]; then
            echo "has_findings=false" >> "$GITHUB_OUTPUT"
            echo "findings_summary=No HIGH or CRITICAL vulnerabilities found." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_findings=true" >> "$GITHUB_OUTPUT"

          # Build a compact summary (service → CVE list) for the PR comment
          # and the Devin prompt. Truncate to 3000 chars for GHA output limits.
          SUMMARY=$(jq -r '
            [.Results[] |
              select((.Vulnerabilities // []) | length > 0) |
              {
                target: .Target,
                vulns: [.Vulnerabilities[] | {
                  id: .VulnerabilityID,
                  pkg: .PkgName,
                  installed: .InstalledVersion,
                  fixed: (.FixedVersion // "n/a"),
                  severity: .Severity,
                  title: .Title
                }]
              }
            ] |
            map("### \(.target)\n" +
              (.vulns | map("- **\(.severity)** `\(.id)`: \(.pkg) \(.installed) → \(.fixed) — \(.title)") | join("\n"))
            ) | join("\n\n")
          ' trivy-results.json | head -c 3000)

          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "findings_summary<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$SUMMARY" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

      - name: Upload scan artifact
        if: steps.parse.outputs.has_findings == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.json
          retention-days: 7

  comment-findings:
    needs: sast-scan
    if: needs.sast-scan.outputs.has_findings == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Post findings to PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FINDINGS_SUMMARY: ${{ needs.sast-scan.outputs.findings_summary }}
          ATTEMPT_COUNT: ${{ needs.sast-scan.outputs.attempt_count }}
          MAX_ATTEMPTS: ${{ env.MAX_FIX_ATTEMPTS }}
          PR_NUM: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          BODY="## :shield: SAST Scan — Findings Detected

          Trivy found **HIGH/CRITICAL** vulnerabilities on this PR.

          ${FINDINGS_SUMMARY}

          ---
          **Remediation attempt:** ${ATTEMPT_COUNT} / ${MAX_ATTEMPTS}"

          gh api \
            "repos/${REPO}/issues/${PR_NUM}/comments" \
            -f body="$BODY"

      - name: Add trivy-remediation-needed label to PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh api "repos/${REPO}/issues/${PR_NUM}/labels" \
            --input - <<< '["trivy-remediation-needed"]'

  trigger-devin:
    needs: sast-scan
    if: |
      needs.sast-scan.outputs.has_findings == 'true' &&
      needs.sast-scan.outputs.exceeded_max == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Devin remediation via webhook automation
        env:
          DEVIN_WEBHOOK_SECRET: ${{ secrets.DEVIN_WEBHOOK_SECRET }}
          WEBHOOK_URL: "https://partner-workshops.devinenterprise.com/api/webhooks/automations/org-9d35f03b68c64253b53de2a8ea69a691/auto-ea3b9981a9c84d6ba476ec498b40ced5"
          BRANCH: ${{ github.head_ref }}
          PR_NUM: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          FINDINGS_SUMMARY: ${{ needs.sast-scan.outputs.findings_summary }}
        run: |
          PAYLOAD=$(jq -n \
            --arg branch "$BRANCH" \
            --arg pr_number "$PR_NUM" \
            --arg repo "$REPO" \
            --arg findings "$FINDINGS_SUMMARY" \
            '{
              event: "trivy_findings_detected",
              pr_number: ($pr_number | tonumber),
              branch: $branch,
              repo: $repo,
              findings_summary: $findings
            }')

          HTTP_CODE=$(curl -s -o /tmp/webhook_response.json -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: ${DEVIN_WEBHOOK_SECRET}" \
            -d "$PAYLOAD" \
            "${WEBHOOK_URL}")

          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "Devin automation webhook accepted (HTTP 200)"
            cat /tmp/webhook_response.json

            {
              echo "## Devin SAST Auto-Fix Triggered (Trivy)"
              echo ""
              echo "A Devin remediation session has been triggered via webhook automation."
              echo ""
              echo "**PR:** #${PR_NUM}"
              echo "**Branch:** ${BRANCH}"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::error::Webhook call failed (HTTP ${HTTP_CODE})"
            cat /tmp/webhook_response.json
            exit 1
          fi

  escalate:
    needs: sast-scan
    if: |
      needs.sast-scan.outputs.has_findings == 'true' &&
      needs.sast-scan.outputs.exceeded_max == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Open escalation issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          FINDINGS_SUMMARY: ${{ needs.sast-scan.outputs.findings_summary }}
          FIX_ATTEMPTS: ${{ env.MAX_FIX_ATTEMPTS }}
        run: |
          BODY="## Automated remediation exhausted

          Devin attempted **${FIX_ATTEMPTS}** fix cycles on
          PR #${PR_NUM} but HIGH/CRITICAL findings remain.

          ### Remaining findings

          ${FINDINGS_SUMMARY}

          ### Next steps

          - Review the findings manually
          - Check if the fixes require breaking API changes
          - Consider adding justified suppressions to .trivyignore
            with proper documentation

          _Opened automatically by the SAST auto-remediation pipeline._"

          gh api "repos/${REPO}/issues" \
            -f title="[Security] Unresolved SAST findings on PR #${PR_NUM}" \
            -f body="$BODY" \
            -f "labels[]=security" \
            -f "labels[]=needs-human-review"

      - name: Comment on PR about escalation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          FIX_ATTEMPTS: ${{ env.MAX_FIX_ATTEMPTS }}
        run: |
          gh api \
            "repos/${REPO}/issues/${PR_NUM}/comments" \
            -f body=":rotating_light: **Escalation:** Automated remediation has been attempted ${FIX_ATTEMPTS} times without resolving all findings. A GitHub Issue has been opened for manual review."

  # ─────────────────────────────────────────────────────────────
  #  Path 2: SonarCloud quality gate (check_run trigger)
  # ─────────────────────────────────────────────────────────────

  sonarcloud-trigger-devin:
    name: Trigger Devin SAST Auto-Fix (SonarCloud)
    concurrency:
      group: sast-fix-${{ github.event.check_run.pull_requests[0].number }}
      cancel-in-progress: true
    if: |
      github.event_name == 'check_run' &&
      github.event.check_run.app.slug == 'sonarqubecloud' &&
      github.event.check_run.conclusion == 'failure' &&
      github.event.check_run.pull_requests[0]
    runs-on: ubuntu-latest
    steps:
      - name: Validate trigger conditions
        id: pr_check
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.check_run.pull_requests[0].number }}
          REPO: ${{ github.repository }}
        run: |
          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"

          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "No PR associated with this check run. Skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PR_DATA=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}" 2>&1)
          PR_AUTHOR=$(echo "$PR_DATA" | jq -r '.user.login')
          PR_BRANCH=$(echo "$PR_DATA" | jq -r '.head.ref')
          PR_STATE=$(echo "$PR_DATA" | jq -r '.state')

          echo "pr_author=${PR_AUTHOR}" >> "$GITHUB_OUTPUT"
          echo "pr_branch=${PR_BRANCH}" >> "$GITHUB_OUTPUT"

          echo "PR #${PR_NUMBER} by ${PR_AUTHOR} on branch ${PR_BRANCH} (state: ${PR_STATE})"

          # Skip PRs authored by Devin to prevent infinite loops
          if [ "$PR_AUTHOR" = "devin-ai-integration[bot]" ]; then
            echo "PR authored by Devin bot. Skipping to prevent loop."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$PR_STATE" != "open" ]; then
            echo "PR is not open (state: ${PR_STATE}). Skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # One-time remediation: check if Devin already attempted a fix
          DEVIN_COMMENTS=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments?per_page=100" \
            --jq '[.[] | select(.body | contains("Devin SAST Auto-Fix"))] | length')

          if [ "$DEVIN_COMMENTS" -gt 0 ]; then
            echo "Devin has already attempted a fix on this PR. Skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "All conditions met — triggering Devin auto-fix."
          echo "should_run=true" >> "$GITHUB_OUTPUT"

      - name: Invoke Devin v3 API to remediate SonarCloud findings
        if: steps.pr_check.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          DEVIN_ORG_ID: ${{ secrets.DEVIN_ORG_ID }}
          CREATE_AS_USER_ID: ${{ secrets.DEVIN_CREATE_AS_USER_ID }}
          PR_NUMBER: ${{ steps.pr_check.outputs.pr_number }}
          PR_BRANCH: ${{ steps.pr_check.outputs.pr_branch }}
          REPO: ${{ github.repository }}
          CHECK_NAME: ${{ github.event.check_run.name }}
          CHECK_URL: ${{ github.event.check_run.html_url }}
          CHECK_OUTPUT_TITLE: ${{ github.event.check_run.output.title }}
        run: |
          PROMPT=$(cat <<'PROMPT_EOF'
          A SonarCloud SAST scan has identified security issues on this PR
          in the OtterWorks polyglot monorepo.

          The SonarCloud quality gate FAILED. Please correct the findings
          — this is a one-time automated remediation attempt before merge.

          Instructions:
          1. Clone the repository and checkout the branch specified below.
          2. Review the SonarCloud findings for this PR at the dashboard URL below.
          3. Fix ALL security vulnerabilities flagged by SonarCloud:
             - For SQL injection: use parameterized queries.
             - For command injection: use safe alternatives to exec().
             - For code injection: remove eval() usage.
             - For path traversal: validate file paths.
             - For dependency CVEs: upgrade to the fixed version.
          4. Run the affected service's tests to verify nothing breaks.
          5. Commit and push to the branch.

          Constraints:
          - Only fix the security vulnerabilities — do not refactor unrelated code.
          - Maintain the same functionality — replace insecure patterns with secure equivalents.
          - This is a ONE-TIME remediation attempt. Make it count.
          PROMPT_EOF
          )

          PROMPT="${PROMPT}

          Branch: ${PR_BRANCH}
          PR: #${PR_NUMBER}
          Repository: ${REPO}
          SonarCloud Check: ${CHECK_NAME}
          SonarCloud Details: ${CHECK_OUTPUT_TITLE}
          SonarCloud Dashboard: https://sonarcloud.io/dashboard?id=Cognition-Partner-Workshops_otterworks&pullRequest=${PR_NUMBER}"

          ESCAPED_PROMPT=$(echo "$PROMPT" | jq -Rs .)

          REQUEST_BODY=$(jq -n \
            --argjson prompt "$ESCAPED_PROMPT" \
            --arg title "Remediate SonarCloud security findings on PR #${PR_NUMBER}" \
            --arg repo "$REPO" \
            --arg user_id "${CREATE_AS_USER_ID}" \
            '{
              prompt: $prompt,
              title: $title,
              repos: [$repo],
              create_as_user_id: $user_id,
              tags: ["sast-fix", "sonarcloud", "security", "automated"]
            }')

          HTTP_RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            -H "Authorization: Bearer ${DEVIN_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$REQUEST_BODY" \
            "https://api.devin.ai/v3/organizations/${DEVIN_ORG_ID}/sessions")

          HTTP_BODY=$(echo "$HTTP_RESPONSE" | sed '/^HTTP_STATUS:/d')
          HTTP_CODE=$(echo "$HTTP_RESPONSE" | grep '^HTTP_STATUS:' | cut -d: -f2)

          if [ "$HTTP_CODE" -eq 200 ]; then
            SESSION_URL=$(echo "$HTTP_BODY" | jq -r '.url')
            SESSION_ID=$(echo "$HTTP_BODY" | jq -r '.session_id')
            echo "Devin session created: ${SESSION_URL}"

            {
              echo "## Devin SAST Auto-Fix Triggered (SonarCloud)"
              echo ""
              echo "SonarCloud flagged security issues on PR #${PR_NUMBER}."
              echo "A Devin session has been created for remediation."
              echo ""
              echo "**Session:** ${SESSION_URL}"
            } >> "$GITHUB_STEP_SUMMARY"

            COMMENT="## Devin SAST Auto-Fix — Remediation In Progress

          SonarCloud identified security issues on this branch. A Devin session
          has been automatically created for a **one-time remediation attempt**.

          **Devin Session:** ${SESSION_URL}

          Devin will commit the fix directly to branch \`${PR_BRANCH}\`.
          SonarCloud will re-analyze once the fix is pushed."

            gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" -f body="$COMMENT"
          else
            echo "::error::Failed to create Devin session (HTTP ${HTTP_CODE})"
            echo "$HTTP_BODY"
            exit 1
          fi
