name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Weekly Monday 6AM UTC

permissions:
  contents: read
  pull-requests: write
  checks: read

jobs:
  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          skip-dirs: 'services/report-service'
          trivyignores: '.trivyignore'

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar xz -C /usr/local/bin gitleaks

      - name: Run Gitleaks
        run: gitleaks detect --source . --verbose --redact

  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep
        run: semgrep scan --config p/default --config p/owasp-top-ten --config p/security-audit --error

  devin-dependency-fix:
    name: Trigger Devin Dependency Vulnerability Fix
    needs: [dependency-scan]
    concurrency:
      group: devin-dep-fix-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    if: |
      always() &&
      needs.dependency-scan.result == 'failure' &&
      github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Check for prior Devin fix attempt
        id: guard
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DEVIN_COMMENTS=$(gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments --paginate \
            --jq '[.[] | select(.body | contains("Devin Dependency Auto-Fix"))] | length')

          if [ "$DEVIN_COMMENTS" -gt 0 ]; then
            echo "Devin has already attempted a dependency fix on this PR. Skipping (max 1 attempt)."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Invoke Devin v3 API to fix dependency vulnerabilities
        if: steps.guard.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          DEVIN_ORG_ID: ${{ secrets.DEVIN_ORG_ID }}
          CREATE_AS_USER_ID: ${{ secrets.DEVIN_CREATE_AS_USER_ID }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          REPO: ${{ github.repository }}
        run: |
          PROMPT=$(cat <<PROMPT_END
          Trivy dependency scanner found CRITICAL or HIGH vulnerabilities on PR #${PR_NUMBER} in repository ${REPO} on branch '${PR_BRANCH}'.

          This is a polyglot microservices platform with services in Go, Java, Rust, Python, Node.js, Kotlin, Scala, Ruby, and C#/.NET.

          Instructions:
          1. Clone the repository ${REPO} and checkout branch '${PR_BRANCH}'.
          2. Run Trivy locally to identify the specific vulnerabilities:
             trivy fs . --severity CRITICAL,HIGH --skip-dirs services/report-service --format json
          3. For each vulnerability found, upgrade the affected dependency to a patched version:
             - Go: update go.mod/go.sum (go get -u <package>)
             - Java/Kotlin: update build.gradle or pom.xml
             - Rust: update Cargo.toml/Cargo.lock (cargo update -p <crate>)
             - Python: update requirements.txt or pyproject.toml
             - Node.js: update package.json/package-lock.json (npm audit fix or manual bump)
             - Ruby: update Gemfile/Gemfile.lock (bundle update <gem>)
             - C#/.NET: update .csproj (dotnet add package <pkg> --version <ver>)
             - Scala: update build.sbt
          4. Re-run Trivy to verify the vulnerabilities are resolved.
          5. Build each affected service to ensure nothing is broken.
          6. Commit the fix with message: "fix: remediate Trivy dependency vulnerabilities on PR #${PR_NUMBER}"
          7. Push to branch '${PR_BRANCH}'.

          Constraints:
          - Only fix the dependency vulnerabilities — do not refactor unrelated code.
          - Prefer minimal version bumps that resolve the CVE.
          - Skip services/report-service (excluded from scanning).
          - This is a ONE-TIME remediation attempt. Make it count.
          PROMPT_END
          )

          ESCAPED_PROMPT=$(echo "$PROMPT" | jq -Rs .)

          REQUEST_BODY=$(jq -n \
            --argjson prompt "$ESCAPED_PROMPT" \
            --arg title "Remediate Trivy dependency vulnerabilities on PR #${PR_NUMBER}" \
            --arg repo "$REPO" \
            --arg user_id "${CREATE_AS_USER_ID}" \
            '{
              prompt: $prompt,
              title: $title,
              repos: [$repo],
              create_as_user_id: $user_id,
              tags: ["dependency-fix", "trivy", "security", "automated"]
            }')

          HTTP_RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            -H "Authorization: Bearer ${DEVIN_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$REQUEST_BODY" \
            "https://api.devin.ai/v3/organizations/${DEVIN_ORG_ID}/sessions")

          HTTP_BODY=$(echo "$HTTP_RESPONSE" | sed '/^HTTP_STATUS:/d')
          HTTP_CODE=$(echo "$HTTP_RESPONSE" | grep '^HTTP_STATUS:' | cut -d: -f2)

          if [ "$HTTP_CODE" -eq 200 ]; then
            SESSION_URL=$(echo "$HTTP_BODY" | jq -r '.url')
            SESSION_ID=$(echo "$HTTP_BODY" | jq -r '.session_id')
            echo "Devin session created: ${SESSION_URL}"
            echo "Session ID: ${SESSION_ID}"

            {
              echo "## Devin Dependency Auto-Fix Triggered"
              echo ""
              echo "Trivy found critical/high dependency vulnerabilities on PR #${PR_NUMBER}."
              echo "A Devin session has been created for a one-time remediation attempt."
              echo ""
              echo "**Session:** ${SESSION_URL}"
            } >> "$GITHUB_STEP_SUMMARY"

            COMMENT=$(cat <<EOF
          ## Devin Dependency Auto-Fix — Remediation In Progress

          Trivy identified critical/high dependency vulnerabilities on this branch. A Devin session has been automatically created for a **one-time remediation attempt** before merge.

          **Devin Session:** ${SESSION_URL}

          Devin will commit the fix directly to branch \`${PR_BRANCH}\`. The security scan will re-run once the fix is pushed.
          EOF
            )

            gh api repos/${REPO}/issues/${PR_NUMBER}/comments -f body="$COMMENT"
          else
            echo "::error::Failed to create Devin session (HTTP ${HTTP_CODE})"
            echo "$HTTP_BODY"
            exit 1
          fi

  devin-sast-fix:
    name: Trigger Devin SAST Auto-Fix
    needs: [sast]
    concurrency:
      group: devin-sast-fix-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    if: |
      always() &&
      needs.sast.result == 'failure' &&
      github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Check for prior Devin SAST fix attempt
        id: guard
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DEVIN_COMMENTS=$(gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments --paginate \
            --jq '[.[] | select(.body | contains("Devin SAST Auto-Fix"))] | length')

          if [ "$DEVIN_COMMENTS" -gt 0 ]; then
            echo "Devin has already attempted a SAST fix on this PR. Skipping (max 1 attempt)."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Invoke Devin v3 API to remediate SAST findings
        if: steps.guard.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          DEVIN_ORG_ID: ${{ secrets.DEVIN_ORG_ID }}
          CREATE_AS_USER_ID: ${{ secrets.DEVIN_CREATE_AS_USER_ID }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          REPO: ${{ github.repository }}
        run: |
          PROMPT=$(cat <<PROMPT_END
          Semgrep SAST scan found security issues on PR #${PR_NUMBER} in repository ${REPO} on branch '${PR_BRANCH}'.

          This is a polyglot microservices platform with services in Go, Java, Rust, Python, Node.js, Kotlin, Scala, Ruby, and C#/.NET.

          Instructions:
          1. Clone the repository ${REPO} and checkout branch '${PR_BRANCH}'.
          2. Run Semgrep locally to identify the specific findings:
             semgrep scan --config p/default --config p/owasp-top-ten --config p/security-audit --json
          3. For each finding, apply the appropriate secure coding fix:
             - SQL injection: use parameterized queries or prepared statements.
             - Command injection: use safe APIs (e.g., execFile in Node.js, ProcessBuilder in Java) and validate inputs.
             - Code injection: remove eval() / dynamic code execution and use safe alternatives.
             - Path traversal: validate and canonicalize file paths within expected directories.
             - XSS: sanitize and escape user input before rendering in HTML.
             - Insecure deserialization: use safe deserialization methods with type validation.
             - Hardcoded secrets: move to environment variables or secret managers.
          4. Re-run Semgrep to verify the findings are resolved.
          5. Build each affected service to ensure nothing is broken.
          6. Commit the fix with message: "fix: remediate Semgrep SAST findings on PR #${PR_NUMBER}"
          7. Push to branch '${PR_BRANCH}'.

          Constraints:
          - Only fix the SAST findings — do not refactor unrelated code.
          - Maintain the same functionality — replace insecure patterns with secure equivalents.
          - This is a ONE-TIME remediation attempt. Make it count.
          PROMPT_END
          )

          ESCAPED_PROMPT=$(echo "$PROMPT" | jq -Rs .)

          REQUEST_BODY=$(jq -n \
            --argjson prompt "$ESCAPED_PROMPT" \
            --arg title "Remediate Semgrep SAST findings on PR #${PR_NUMBER}" \
            --arg repo "$REPO" \
            --arg user_id "${CREATE_AS_USER_ID}" \
            '{
              prompt: $prompt,
              title: $title,
              repos: [$repo],
              create_as_user_id: $user_id,
              tags: ["sast-fix", "semgrep", "security", "automated"]
            }')

          HTTP_RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            -H "Authorization: Bearer ${DEVIN_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$REQUEST_BODY" \
            "https://api.devin.ai/v3/organizations/${DEVIN_ORG_ID}/sessions")

          HTTP_BODY=$(echo "$HTTP_RESPONSE" | sed '/^HTTP_STATUS:/d')
          HTTP_CODE=$(echo "$HTTP_RESPONSE" | grep '^HTTP_STATUS:' | cut -d: -f2)

          if [ "$HTTP_CODE" -eq 200 ]; then
            SESSION_URL=$(echo "$HTTP_BODY" | jq -r '.url')
            SESSION_ID=$(echo "$HTTP_BODY" | jq -r '.session_id')
            echo "Devin session created: ${SESSION_URL}"
            echo "Session ID: ${SESSION_ID}"

            {
              echo "## Devin SAST Auto-Fix Triggered"
              echo ""
              echo "Semgrep found security issues on PR #${PR_NUMBER}."
              echo "A Devin session has been created for a one-time remediation attempt."
              echo ""
              echo "**Session:** ${SESSION_URL}"
            } >> "$GITHUB_STEP_SUMMARY"

            COMMENT=$(cat <<EOF
          ## Devin SAST Auto-Fix — Remediation In Progress

          Semgrep identified security issues on this branch. A Devin session has been automatically created for a **one-time remediation attempt** before merge.

          **Devin Session:** ${SESSION_URL}

          Devin will commit the fix directly to branch \`${PR_BRANCH}\`. The security scan will re-run once the fix is pushed.
          EOF
            )

            gh api repos/${REPO}/issues/${PR_NUMBER}/comments -f body="$COMMENT"
          else
            echo "::error::Failed to create Devin session (HTTP ${HTTP_CODE})"
            echo "$HTTP_BODY"
            exit 1
          fi
