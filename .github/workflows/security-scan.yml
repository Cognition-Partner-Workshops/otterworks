name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Weekly Monday 6AM UTC

permissions:
  contents: read

jobs:
  dependency-scan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0

      - name: Fetch base ref
        env:
          BASE_REF: ${{ github.base_ref }}
        run: git fetch --no-tags origin "$BASE_REF:refs/remotes/origin/$BASE_REF"

      - name: Install Trivy
        run: |
          curl -sSfL https://github.com/aquasecurity/trivy/releases/download/v0.71.0/trivy_0.71.0_Linux-64bit.tar.gz \
            -o /tmp/trivy.tar.gz
          tar xz -C /usr/local/bin -f /tmp/trivy.tar.gz trivy

      - name: Scan pull request head
        run: |
          trivy fs . --severity CRITICAL,HIGH \
            --skip-dirs services/report-service \
            --ignorefile .trivyignore \
            --offline-scan \
            --format json --output trivy-head.json

      - name: Scan merge base
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          base="$(git merge-base "origin/$BASE_REF" HEAD)"
          git worktree add --detach ../otterworks-base "$base"
          trap 'git worktree remove --force ../otterworks-base' EXIT
          (
            cd ../otterworks-base
            trivy fs . --severity CRITICAL,HIGH \
            --skip-dirs services/report-service \
            --ignorefile .trivyignore \
            --offline-scan \
            --format json --output "$GITHUB_WORKSPACE/trivy-base.json"
          )

      - name: Fail only on newly introduced vulnerabilities
        run: |
          # Compare stable finding identities so acknowledged/base findings do not gate PRs.
          jq -r '[.Results[]?.Vulnerabilities[]? |
            [.Target, .PkgName, .VulnerabilityID] | @tsv] | .[]' trivy-head.json |
            sort -u > head-findings.tsv
          jq -r '[.Results[]?.Vulnerabilities[]? |
            [.Target, .PkgName, .VulnerabilityID] | @tsv] | .[]' trivy-base.json |
            sort -u > base-findings.tsv
          comm -23 head-findings.tsv base-findings.tsv > new-findings.tsv
          if [[ -s new-findings.tsv ]]; then
            echo "New CRITICAL/HIGH vulnerabilities introduced by this PR:"
            while IFS=$'\t' read -r target package vulnerability; do
              jq -r --arg target "$target" --arg package "$package" --arg vulnerability "$vulnerability" '
                .Results[]? | select(.Target == $target) | .Vulnerabilities[]? |
                select(.PkgName == $package and .VulnerabilityID == $vulnerability) |
                "\(.VulnerabilityID) \(.Severity) \($target) \(.PkgName) \(.InstalledVersion) -> \(.FixedVersion // "no fixed version")"
              ' trivy-head.json
            done < new-findings.tsv
            exit 1
          fi
          echo "No new CRITICAL/HIGH vulnerabilities introduced by this PR."

  secret-scan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0

      - name: Fetch base ref
        env:
          BASE_REF: ${{ github.base_ref }}
        run: git fetch --no-tags origin "$BASE_REF:refs/remotes/origin/$BASE_REF"

      - name: Install Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            -o /tmp/gitleaks.tar.gz
          tar xz -C /usr/local/bin -f /tmp/gitleaks.tar.gz gitleaks

      - name: Scan pull request commits
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          # PR-only scoping prevents known historical lab fixtures from gating PRs.
          # The full-history scan runs in the informational full-scan-baseline job.
          gitleaks detect --source . --verbose --redact \
            --log-opts "origin/$BASE_REF..HEAD"

  sast:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0

      - name: Fetch base ref
        env:
          BASE_REF: ${{ github.base_ref }}
        run: git fetch --no-tags origin "$BASE_REF:refs/remotes/origin/$BASE_REF"

      - name: Install Semgrep
        run: pip install semgrep

      - name: Scan pull request changes
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          base="$(git merge-base "origin/$BASE_REF" HEAD)"
          semgrep scan --config p/default --config p/owasp-top-ten \
            --config p/security-audit --error --baseline-commit "$base"

  full-scan-baseline:
    if: github.event_name == 'push' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0

      # This intentionally surfaces known lab-fixture findings without gating PRs.
      # PR gating happens in the three diff-scoped jobs above.
      - name: Install scanners
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            -o /tmp/gitleaks.tar.gz
          tar xz -C /usr/local/bin -f /tmp/gitleaks.tar.gz gitleaks
          curl -sSfL https://github.com/aquasecurity/trivy/releases/download/v0.71.0/trivy_0.71.0_Linux-64bit.tar.gz \
            -o /tmp/trivy.tar.gz
          tar xz -C /usr/local/bin -f /tmp/trivy.tar.gz trivy
          pip install semgrep

      - name: Run full-history Gitleaks scan
        id: gitleaks
        run: |
          set +e
          gitleaks detect --source . --verbose --redact \
            --report-format json --report-path gitleaks.json
          rc=$?
          set -e
          count="$(jq 'length' gitleaks.json 2>/dev/null || echo 0)"
          echo "### Gitleaks full-history baseline: ${count} findings" >> "$GITHUB_STEP_SUMMARY"
          if [[ "$count" -gt 0 ]]; then
            echo "::warning::Gitleaks full-history baseline found ${count} findings"
          fi
          echo "exit_code=${rc}" >> "$GITHUB_OUTPUT"

      - name: Run full Semgrep scan
        id: semgrep
        run: |
          set +e
          semgrep scan --config p/default --config p/owasp-top-ten \
            --config p/security-audit --error --json --output semgrep.json
          rc=$?
          set -e
          count="$(jq '.results | length' semgrep.json 2>/dev/null || echo 0)"
          echo "### Semgrep full baseline: ${count} findings" >> "$GITHUB_STEP_SUMMARY"
          if [[ "$count" -gt 0 ]]; then
            echo "::warning::Semgrep full baseline found ${count} findings"
          fi
          echo "exit_code=${rc}" >> "$GITHUB_OUTPUT"

      - name: Run full Trivy scan
        id: trivy
        run: |
          set +e
          trivy fs . --severity CRITICAL,HIGH \
            --skip-dirs services/report-service \
            --ignorefile .trivyignore \
            --offline-scan \
            --format json --output trivy.json
          rc=$?
          set -e
          count="$(jq '[.Results[]?.Vulnerabilities[]?] | length' trivy.json 2>/dev/null || echo 0)"
          echo "### Trivy full baseline: ${count} findings" >> "$GITHUB_STEP_SUMMARY"
          if [[ "$count" -gt 0 ]]; then
            echo "::warning::Trivy full baseline found ${count} findings"
          fi
          echo "exit_code=${rc}" >> "$GITHUB_OUTPUT"
