name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Weekly Monday 6AM UTC

jobs:
  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          skip-dirs: 'services/report-service'
          trivyignores: '.trivyignore'

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar xz -C /usr/local/bin gitleaks

      - name: Run Gitleaks
        run: gitleaks detect --source . --verbose --redact

  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep
        run: semgrep scan --config p/default --config p/owasp-top-ten --config p/security-audit --error

      - name: Run Semgrep (SARIF output for remediation)
        if: always()
        id: semgrep-sarif
        run: |
          semgrep scan --config p/default --config p/owasp-top-ten --config p/security-audit \
            --sarif --output semgrep-results.sarif || true
          if [ -s semgrep-results.sarif ]; then
            count=$(python3 -c "import json; d=json.load(open('semgrep-results.sarif')); print(len(d.get('runs',[{}])[0].get('results',[])))" 2>/dev/null || echo "0")
            echo "finding-count=$count" >> "$GITHUB_OUTPUT"
          else
            echo "finding-count=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload SARIF results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep-results.sarif
          retention-days: 30
          if-no-files-found: ignore
