name: Devin Security Scan

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  statuses: write

env:
  DEVIN_API_BASE: https://api.partner-workshops.devinenterprise.com

jobs:
  trigger-devin-security-scan:
    # Skip PRs authored by the Devin bot to prevent feedback loops
    if: github.event.pull_request.user.login != 'devin-ai-integration[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Devin Review (security scan)
        id: trigger
        env:
          DEVIN_API_TOKEN: ${{ secrets.DEVIN_API_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          HTTP_RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "${DEVIN_API_BASE}/v3/enterprise/pr-reviews" \
            -H "Authorization: Bearer ${DEVIN_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"pr_url\": \"${PR_URL}\"}")

          HTTP_BODY=$(echo "$HTTP_RESPONSE" | sed '/^HTTP_STATUS:/d')
          HTTP_CODE=$(echo "$HTTP_RESPONSE" | grep '^HTTP_STATUS:' | cut -d: -f2)

          echo "HTTP status: ${HTTP_CODE}"
          echo "Response: ${HTTP_BODY}"

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Devin security scan triggered successfully"

            COMMIT_SHA=$(echo "$HTTP_BODY" | jq -r '.commit_sha // empty')
            STATUS=$(echo "$HTTP_BODY" | jq -r '.status // empty')

            echo "commit_sha=${COMMIT_SHA}" >> "$GITHUB_OUTPUT"
            echo "status=${STATUS}" >> "$GITHUB_OUTPUT"

            {
              echo "## Devin Security Scan Triggered"
              echo ""
              echo "Devin Review (with security scanning) has been triggered for this PR."
              echo ""
              echo "- **Commit:** \`${COMMIT_SHA}\`"
              echo "- **Status:** ${STATUS}"
              echo ""
              echo "Security findings will be posted as PR comments once the scan completes."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::error::Failed to trigger Devin security scan (HTTP ${HTTP_CODE})"
            echo "$HTTP_BODY"
            exit 1
          fi

      - name: Comment on PR
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          COMMIT_SHA: ${{ steps.trigger.outputs.commit_sha }}
        run: |
          EXISTING_COMMENT=$(gh api \
            "repos/${REPO}/issues/${PR_NUM}/comments?per_page=100" \
            --jq '[.[] | select(.body | contains("Devin Security Scan"))] | length')

          if [ "$EXISTING_COMMENT" -eq 0 ]; then
            BODY="## :shield: Devin Security Scan

          A Devin security scan has been triggered for commit \`${COMMIT_SHA}\`.

          The scan checks for:
          - Injection flaws (SQL, XSS, command, template injection)
          - Auth & access control issues
          - Hardcoded secrets and credential exposure
          - SSRF and path traversal
          - Insecure deserialization and prototype pollution
          - Missing input validation
          - Weak cryptography
          - Transport/cookie security misconfigurations

          Findings will appear as inline PR comments once the review completes."

            gh api "repos/${REPO}/issues/${PR_NUM}/comments" -f body="$BODY"
          fi
