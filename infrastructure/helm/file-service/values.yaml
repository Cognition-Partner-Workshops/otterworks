replicaCount: 1

image:
  repository: 599083837640.dkr.ecr.us-east-1.amazonaws.com/workshop/otterworks-file-service
  tag: ""  # Set at deploy time (ECR uses IMMUTABLE tags)
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8082

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: file-service.otterworks.workshop.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: file-service-tls
      hosts:
        - file-service.otterworks.workshop.example.com

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

healthCheck:
  path: /health
  port: 8082

monitoring:
  enabled: true
  path: /metrics
  port: 8082

networkPolicy:
  enabled: true
  ingressNamespace: ingress-nginx
  monitoringNamespace: monitoring

config:
  s3Bucket: ""  # Set at deploy time (must match Terraform bucket name, e.g. otterworks-files-dev)
  dynamodbTable: "otterworks-file-metadata"
  dynamodbFoldersTable: "otterworks-folders"
  dynamodbVersionsTable: "otterworks-file-versions"
  dynamodbSharesTable: "otterworks-file-shares"
  snsTopicArn: ""  # Set at deploy time from Terraform output

serviceAccount:
  roleArn: ""
