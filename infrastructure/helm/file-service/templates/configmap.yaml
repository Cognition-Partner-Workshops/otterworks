apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    platform/environment: {{ (.Values.global).environment | default "dev" }}
    platform/team: otterworks
data:
  S3_BUCKET: {{ required "config.s3Bucket must be set" .Values.config.s3Bucket | quote }}
  DYNAMODB_TABLE: {{ .Values.config.dynamodbTable | default "otterworks-file-metadata" | quote }}
  DYNAMODB_FOLDERS_TABLE: {{ .Values.config.dynamodbFoldersTable | default "otterworks-folders" | quote }}
  DYNAMODB_VERSIONS_TABLE: {{ .Values.config.dynamodbVersionsTable | default "otterworks-file-versions" | quote }}
  DYNAMODB_SHARES_TABLE: {{ .Values.config.dynamodbSharesTable | default "otterworks-file-shares" | quote }}
  AWS_REGION: {{ .Values.config.awsRegion | default "us-east-1" | quote }}
  {{- if .Values.config.snsTopicArn }}
  SNS_TOPIC_ARN: {{ .Values.config.snsTopicArn | quote }}
  {{- end }}
  {{- if .Values.config.redisHost }}
  REDIS_HOST: {{ .Values.config.redisHost | quote }}
  {{- end }}
  REDIS_PORT: {{ .Values.config.redisPort | default "6379" | quote }}
  RUST_LOG: {{ .Values.config.rustLog | default "file_service=info,actix_web=info" | quote }}
  CHAOS_ENABLED: {{ .Values.config.chaosEnabled | default "false" | quote }}
