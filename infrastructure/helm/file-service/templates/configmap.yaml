apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
data:
  AWS_REGION: {{ .Values.config.awsRegion | quote }}
  S3_BUCKET: {{ .Values.config.s3Bucket | quote }}
  DYNAMODB_TABLE: {{ .Values.config.dynamodbTable | quote }}
  DYNAMODB_FOLDERS_TABLE: {{ .Values.config.dynamodbFoldersTable | quote }}
  DYNAMODB_VERSIONS_TABLE: {{ .Values.config.dynamodbVersionsTable | quote }}
  DYNAMODB_SHARES_TABLE: {{ .Values.config.dynamodbSharesTable | quote }}
  {{- if .Values.config.snsTopicArn }}
  SNS_TOPIC_ARN: {{ .Values.config.snsTopicArn | quote }}
  {{- end }}
  {{- if .Values.config.redisHost }}
  REDIS_HOST: {{ .Values.config.redisHost | quote }}
  {{- end }}
  {{- if .Values.config.redisPort }}
  REDIS_PORT: {{ .Values.config.redisPort | quote }}
  {{- end }}
  RUST_LOG: {{ .Values.config.rustLog | quote }}
