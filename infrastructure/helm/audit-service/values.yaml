replicaCount: 1

image:
  repository: 599083837640.dkr.ecr.us-east-1.amazonaws.com/workshop/otterworks-audit-service
  tag: ""  # Set at deploy time (ECR uses IMMUTABLE tags)
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8090
  targetPort: 8090

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: audit-service.otterworks.workshop.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: audit-service-tls
      hosts:
        - audit-service.otterworks.workshop.example.com

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

healthCheck:
  path: /health
  port: 8090

monitoring:
  enabled: true
  path: /metrics
  port: 8090

networkPolicy:
  enabled: true
  ingressNamespace: ingress-nginx
  monitoringNamespace: monitoring

serviceAccount:
  roleArn: ""
