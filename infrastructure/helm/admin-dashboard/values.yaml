replicaCount: 1

image:
  repository: 599083837640.dkr.ecr.us-east-1.amazonaws.com/workshop/otterworks-admin-dashboard
  tag: ""  # Set at deploy time (ECR uses IMMUTABLE tags)
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 4200

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: admin-dashboard.otterworks.workshop.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: admin-dashboard-tls
      hosts:
        - admin-dashboard.otterworks.workshop.example.com

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

healthCheck:
  path: /health
  port: 4200

monitoring:
  enabled: true
  path: /metrics
  port: 4200

networkPolicy:
  enabled: true
  ingressNamespace: ingress-nginx
  monitoringNamespace: monitoring
