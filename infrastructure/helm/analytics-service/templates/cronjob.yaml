{{- if .Values.cronjob.enabled -}}
# Nightly usage-rollup batch job (LEGACY "before" state for the
# batch -> event-driven re-architect demo). This is scheduled, timer-driven,
# poll-and-process batch processing -- NOT event-driven. See
# docs/BATCH-USAGE-ROLLUP.md for the EventBridge -> SQS -> Lambda target.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-usage-rollup
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/component: batch
    platform/environment: {{ (.Values.global).environment | default "dev" }}
    platform/team: otterworks
spec:
  schedule: {{ .Values.cronjob.schedule | quote }}
  concurrencyPolicy: {{ .Values.cronjob.concurrencyPolicy }}
  successfulJobsHistoryLimit: {{ .Values.cronjob.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.cronjob.failedJobsHistoryLimit }}
  startingDeadlineSeconds: {{ .Values.cronjob.startingDeadlineSeconds }}
  jobTemplate:
    spec:
      backoffLimit: {{ .Values.cronjob.backoffLimit }}
      template:
        metadata:
          labels:
            app.kubernetes.io/name: {{ .Chart.Name }}
            app.kubernetes.io/instance: {{ .Release.Name }}
            app.kubernetes.io/component: batch
        spec:
          serviceAccountName: {{ .Release.Name }}
          restartPolicy: Never
          containers:
            - name: usage-rollup
              image: "{{ .Values.image.repository }}:{{ required "image.tag must be set (ECR uses IMMUTABLE tags)" .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command: ["java"]
              args:
                - "-cp"
                - "app.jar"
                - "com.otterworks.analytics.batch.UsageRollupJob"
              env:
                - name: ROLLUP_INPUT
                  value: {{ .Values.cronjob.input | quote }}
                - name: ROLLUP_OUTPUT
                  value: {{ .Values.cronjob.output | quote }}
              envFrom:
                - configMapRef:
                    name: {{ .Release.Name }}-config
                    optional: true
                - secretRef:
                    name: {{ .Release.Name }}-secrets
                    optional: true
              resources:
                {{- toYaml .Values.cronjob.resources | nindent 16 }}
              volumeMounts:
                - name: rollup-output
                  mountPath: {{ .Values.cronjob.outputDir | quote }}
          volumes:
            - name: rollup-output
              emptyDir: {}
{{- end }}
