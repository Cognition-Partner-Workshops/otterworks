replicaCount: 1

image:
  repository: <AWS_ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/workshop/otterworks-analytics-service
  tag: ""  # Set at deploy time (ECR uses IMMUTABLE tags)
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8088

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: analytics-service.otterworks.workshop.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: analytics-service-tls
      hosts:
        - analytics-service.otterworks.workshop.example.com

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

healthCheck:
  path: /health
  port: 8088

monitoring:
  enabled: true
  path: /metrics
  port: 8088

networkPolicy:
  enabled: true
  ingressNamespace: ingress-nginx
  monitoringNamespace: monitoring

serviceAccount:
  roleArn: ""

# Non-sensitive service configuration rendered into {{ .Release.Name }}-config
# and injected via envFrom. Populate at deploy time (e.g. from Terraform outputs).
config: {}

# Sensitive configuration rendered into {{ .Release.Name }}-secrets (Opaque,
# stringData) and injected via envFrom. Populate at deploy time; never commit values.
secrets: {}

# Nightly usage-rollup batch job (LEGACY "before" state for the batch ->
# event-driven re-architect demo). Deploys as a Kubernetes CronJob that
# bulk-loads analytics events and aggregates them into per-day usage rollups.
# See docs/BATCH-USAGE-ROLLUP.md.
cronjob:
  enabled: true
  schedule: "0 2 * * *" # nightly at 02:00 UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 300
  backoffLimit: 2
  # NDJSON input source. Defaults to the deterministic seed bundled in the image.
  input: "/seed/usage-events.ndjson"
  outputDir: "/var/lib/otterworks"
  output: "/var/lib/otterworks/usage-rollup.json"
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
