replicaCount: 1

image:
  repository: 599083837640.dkr.ecr.us-east-1.amazonaws.com/workshop/otterworks-api-gateway
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: otterworks.workshop.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: otterworks-tls
      hosts:
        - otterworks.workshop.example.com

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

healthCheck:
  path: /health
  port: 8080

monitoring:
  enabled: true
  path: /metrics
  port: 8080

networkPolicy:
  enabled: true
  ingressNamespace: ingress-nginx
  monitoringNamespace: monitoring
