apiVersion: v1
kind: LimitRange
metadata:
  name: otterworks-limits
  namespace: decomposition-dev
  labels:
    app.kubernetes.io/managed-by: terraform
    platform/environment: dev
    platform/team: otterworks
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 256Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
