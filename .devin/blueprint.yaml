# https://docs.devin.ai/onboard-devin/environment-yaml
# Docker + Compose v2 preinstalled; app + mobile + desktop toolchains set up here.
initialize: |
  # Pre-pull infra images and pre-build all service/frontend images (layers persist; containers do not).
  docker compose -f docker-compose.infra.yml pull
  docker compose -f docker-compose.infra.yml -f docker-compose.yml build

  # --- Mobile (Capacitor Android app at frontend/client-app/mobile/android) ---
  # JDK 21 (Capacitor 8 / AGP require it)
  sudo apt-get update && sudo apt-get install -y openjdk-21-jdk-headless
  echo "JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64" >> $ENVRC
  sudo usermod -aG kvm "$(whoami)" || true   # emulator hardware acceleration (/dev/kvm)

  # Node 22 (Vite 8 requires Node >=20.19)
  export NVM_DIR="$HOME/.nvm"; . "$NVM_DIR/nvm.sh"; nvm install 22 && nvm alias default 22

  # Android SDK command-line tools + packages (compileSdk 36)
  export ANDROID_HOME=$HOME/Android/Sdk
  mkdir -p $ANDROID_HOME/cmdline-tools
  if [ ! -d "$ANDROID_HOME/cmdline-tools/latest" ]; then
    curl -sL -o /tmp/cmdtools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
    unzip -q -o /tmp/cmdtools.zip -d $ANDROID_HOME/cmdline-tools
    mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
  fi
  SDKM=$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager
  yes | $SDKM --licenses >/dev/null
  $SDKM "platform-tools" "emulator" "platforms;android-36" "build-tools;36.0.0" "system-images;android-36;google_apis;x86_64"
  echo "no" | $ANDROID_HOME/cmdline-tools/latest/bin/avdmanager create avd -n otter -k "system-images;android-36;google_apis;x86_64" -d pixel_6 --force
  echo "ANDROID_HOME=$HOME/Android/Sdk" >> $ENVRC
  echo "ANDROID_SDK_ROOT=$HOME/Android/Sdk" >> $ENVRC
  echo 'PATH=$HOME/Android/Sdk/platform-tools:$HOME/Android/Sdk/emulator:$HOME/Android/Sdk/cmdline-tools/latest/bin:$PATH' >> $ENVRC

  # Gradle wrapper jar is gitignored; generate it for the Capacitor android project
  curl -sL -o /tmp/gradle.zip https://services.gradle.org/distributions/gradle-8.14.3-bin.zip
  unzip -q -o /tmp/gradle.zip -d $HOME/gradle-dist
  (cd frontend/client-app/mobile/android && $HOME/gradle-dist/gradle-8.14.3/bin/gradle wrapper --gradle-version 8.14.3)
maintenance: |
  export NVM_DIR="$HOME/.nvm"; . "$NVM_DIR/nvm.sh"; nvm use default >/dev/null
  # Include the linux rolldown native binding (npm optional-deps bug omits it -> Vite build fails)
  (cd frontend/client-app && npm install && npm install --no-save @rolldown/binding-linux-x64-gnu@1.1.5)
  # Electron desktop app deps (downloads the Electron binary via postinstall under Node 22)
  (cd frontend/client-app/desktop && npm install)
knowledge:
  - name: run backend + web
    contents: |
      make infra-up && make up   # web :3000, admin :4200, gateway :8080
  - name: run android app
    contents: |
      sudo chmod 666 /dev/kvm    # /dev/kvm perms reset each boot
      emulator -avd otter -no-snapshot -no-audio -no-window -gpu swiftshader_indirect &
      adb wait-for-device
      make dev-android   # builds (with the correct collab port) + cap sync + cap run on the emulator
      # App calls the gateway at http://10.0.2.2:8080/api/v1 (debug build allows cleartext to 10.0.2.2).
  - name: run electron desktop app
    contents: |
      DISPLAY=:0 make dev-electron   # builds (with the correct collab port) + launches the Electron desktop app
      # Embedded server on :34117 proxies /api/v1 to the gateway; run with Node 22.
  - name: test
    contents: |
      make test
  - name: lint
    contents: |
      make lint
