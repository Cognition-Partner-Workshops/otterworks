# https://docs.devin.ai/onboard-devin/environment-yaml
# Docker + Compose v2 preinstalled; app + mobile + desktop toolchains set up here.
initialize: |
  # Pre-pull infra images and pre-build all service/frontend images (layers persist; containers do not).
  docker compose -f docker-compose.infra.yml pull
  # Build one service at a time with retries. Building everything in parallel overwhelms
  # Docker's embedded DNS (127.0.0.11), so dependency fetches (e.g. cargo's static.crates.io)
  # intermittently fail to resolve; serializing avoids the DNS storm and the retry covers blips.
  COMPOSE="docker compose -f docker-compose.infra.yml -f docker-compose.yml"
  for svc in $($COMPOSE config --services); do
    n=0
    until $COMPOSE build "$svc"; do
      n=$((n+1)); [ "$n" -ge 3 ] && { echo "build failed for $svc after $n attempts"; exit 1; }
      echo "retrying build for $svc ($n)"; sleep 10
    done
  done

  # --- Mobile (Capacitor Android app at frontend/client-app/mobile/android) ---
  # JDK 21 (Capacitor 8 / AGP require it)
  sudo apt-get update && sudo apt-get install -y openjdk-21-jdk-headless
  echo "JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64" >> $ENVRC
  sudo usermod -aG kvm "$(whoami)" || true   # emulator hardware acceleration (/dev/kvm)

  # Node 22 (Vite 8 requires Node >=20.19)
  export NVM_DIR="$HOME/.nvm"; . "$NVM_DIR/nvm.sh"; nvm install 22 && nvm alias default 22

  # Android SDK command-line tools + packages (compileSdk 36)
  export ANDROID_HOME=$HOME/Android/Sdk
  mkdir -p $ANDROID_HOME/cmdline-tools
  if [ ! -d "$ANDROID_HOME/cmdline-tools/latest" ]; then
    curl -sL -o /tmp/cmdtools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
    unzip -q -o /tmp/cmdtools.zip -d $ANDROID_HOME/cmdline-tools
    mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
  fi
  SDKM=$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager
  yes | $SDKM --licenses >/dev/null
  $SDKM "platform-tools" "emulator" "platforms;android-36" "build-tools;36.0.0" "system-images;android-36;google_apis;x86_64"
  echo "no" | $ANDROID_HOME/cmdline-tools/latest/bin/avdmanager create avd -n otter -k "system-images;android-36;google_apis;x86_64" -d pixel_6 --force
  echo "ANDROID_HOME=$HOME/Android/Sdk" >> $ENVRC
  echo "ANDROID_SDK_ROOT=$HOME/Android/Sdk" >> $ENVRC
  echo 'PATH=$HOME/Android/Sdk/platform-tools:$HOME/Android/Sdk/emulator:$HOME/Android/Sdk/cmdline-tools/latest/bin:$PATH' >> $ENVRC

  # Gradle wrapper jar is gitignored. Generate it in a scratch project and copy the jar in.
  # (The jar is version-specific, not project-specific. Running `gradle wrapper` inside the
  #  android project would configure Capacitor modules whose files - e.g. cordova.variables.gradle -
  #  only exist after `npx cap sync`, which hasn't run yet, so we avoid touching that project here.)
  curl -sL -o /tmp/gradle.zip https://services.gradle.org/distributions/gradle-8.14.3-bin.zip
  unzip -q -o /tmp/gradle.zip -d $HOME/gradle-dist
  mkdir -p /tmp/gradle-wrapper-gen && touch /tmp/gradle-wrapper-gen/settings.gradle
  (cd /tmp/gradle-wrapper-gen && $HOME/gradle-dist/gradle-8.14.3/bin/gradle wrapper --gradle-version 8.14.3)
  cp /tmp/gradle-wrapper-gen/gradle/wrapper/gradle-wrapper.jar \
     frontend/client-app/mobile/android/gradle/wrapper/gradle-wrapper.jar

  # Warm the Gradle build cache once (persists on the microVM filesystem) so runtime
  # `make dev-android` builds are incremental. Needs the synced Capacitor Android project,
  # which requires node deps + the web bundle first.
  export ANDROID_HOME=$HOME/Android/Sdk ANDROID_SDK_ROOT=$HOME/Android/Sdk
  export PATH=$ANDROID_HOME/platform-tools:$ANDROID_HOME/emulator:$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
  nvm use default
  # Collab URL is irrelevant here (only affects the JS bundle at runtime); the runtime
  # `make dev-android` rebuilds with the correct port. We just need a synced project.
  (cd frontend/client-app && npm install && npm install --no-save @rolldown/binding-linux-x64-gnu@1.1.5 \
     && npm run build && npx cap sync android)
  (cd frontend/client-app/mobile/android && ./gradlew --no-daemon assembleDebug)

  # Boot the emulator once headlessly, disable animations, and save a "clean" snapshot so
  # runtime launches resume from saved state (with a window) instead of cold-booting.
  sudo chmod 666 /dev/kvm || true
  emulator -avd otter -no-window -no-audio -no-snapshot -gpu swiftshader_indirect &
  EMU_PID=$!
  # Fail fast if the emulator dies at boot (e.g. no /dev/kvm) instead of hanging forever.
  timeout 120 adb wait-for-device || { echo "emulator failed to start (no /dev/kvm?)"; kill $EMU_PID 2>/dev/null; exit 1; }
  timeout 240 bash -c 'until [ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d "\r")" = 1 ]; do sleep 3; done'
  adb shell settings put global window_animation_scale 0
  adb shell settings put global transition_animation_scale 0
  adb shell settings put global animator_duration_scale 0
  adb emu avd snapshot save clean
  adb emu kill || true
  wait $EMU_PID 2>/dev/null || true
maintenance: |
  export NVM_DIR="$HOME/.nvm"; . "$NVM_DIR/nvm.sh"; nvm use default >/dev/null
  # Include the linux rolldown native binding (npm optional-deps bug omits it -> Vite build fails)
  (cd frontend/client-app && npm install && npm install --no-save @rolldown/binding-linux-x64-gnu@1.1.5)
  # Electron desktop app deps (downloads the Electron binary via postinstall under Node 22)
  (cd frontend/client-app/desktop && npm install)
knowledge:
  - name: run backend + web
    contents: |
      make infra-up && make up   # web :3000, admin :4200, gateway :8080
  - name: run android app
    contents: |
      # Free resources before launching the emulator (virtualized microVM).
      pkill -f chrome 2>/dev/null || true
      sudo systemctl stop snapd unattended-upgrades cron 2>/dev/null || true
      sync; echo 3 | sudo tee /proc/sys/vm/drop_caches >/dev/null
      sudo chmod 666 /dev/kvm    # /dev/kvm perms reset each boot
      # Resume the "clean" snapshot baked in at init (visible window; faster than cold boot).
      # If the snapshot is missing it just cold-boots; -no-snapshot-save keeps it pristine.
      DISPLAY=:0 emulator -avd otter -no-audio -gpu swiftshader_indirect -snapshot clean -no-snapshot-save &
      adb wait-for-device
      # Use Node 22 (Vite 8 needs >=20.19; the system node is 20.18 and fails the build).
      export NVM_DIR="$HOME/.nvm"; . "$NVM_DIR/nvm.sh"; nvm use default >/dev/null
      make dev-android   # builds (with the correct collab port) + cap sync + cap run on the emulator
      # If cap run prompts to pick a target: npx cap run android --target emulator-5554 (from frontend/client-app).
      # App calls the gateway at http://10.0.2.2:8080/api/v1 (debug build allows cleartext to 10.0.2.2).
  - name: run electron desktop app
    contents: |
      DISPLAY=:0 make dev-electron   # builds (with the correct collab port) + launches the Electron desktop app
      # Embedded server on :34117 proxies /api/v1 to the gateway; run with Node 22.
  - name: test
    contents: |
      make test
  - name: lint
    contents: |
      make lint
