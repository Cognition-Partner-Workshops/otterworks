apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-dashboard
  namespace: {{ .Values.platformNamespace }}
  labels:
    {{- include "demo-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: ops-dashboard
spec:
  type: ClusterIP
  selector:
    {{- include "demo-platform.dashboardSelectorLabels" . | nindent 4 }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.dashboard.service.port }}
      targetPort: http
