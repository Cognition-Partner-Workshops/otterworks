apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Values.platformNamespace }}
  labels:
    {{- include "demo-platform.labels" . | nindent 4 }}
  annotations:
    # Scoped IRSA role (control table + shared-data GC + tenant IRSA trust +
    # eks:DescribeCluster) — NOT cluster-admin and NOT the otterworks-* wildcard.
    eks.amazonaws.com/role-arn: {{ include "demo-platform.roleArn" . }}
