{{- if .Values.secret.create }}
{{- if not .Values.secret.dashboardPasscode }}
{{- fail "secret.dashboardPasscode is required (pass via -f secrets.yaml or --set-file; never on argv). Set secret.create=false to manage the Secret out-of-band." }}
{{- end }}
{{- if not .Values.secret.sessionSecret }}
{{- fail "secret.sessionSecret is required (pass via -f secrets.yaml or --set-file; never on argv). Set secret.create=false to manage the Secret out-of-band." }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Values.platformNamespace }}
  labels:
    {{- include "demo-platform.labels" . | nindent 4 }}
type: Opaque
data:
  DASHBOARD_PASSCODE: {{ .Values.secret.dashboardPasscode | b64enc | quote }}
  SESSION_SECRET: {{ .Values.secret.sessionSecret | b64enc | quote }}
  {{- if .Values.secret.dbPassword }}
  DB_PASSWORD: {{ .Values.secret.dbPassword | b64enc | quote }}
  {{- end }}
  {{- if .Values.secret.jwtSecret }}
  JWT_SECRET: {{ .Values.secret.jwtSecret | b64enc | quote }}
  {{- end }}
  {{- if .Values.secret.secretKeyBase }}
  SECRET_KEY_BASE: {{ .Values.secret.secretKeyBase | b64enc | quote }}
  {{- end }}
  {{- if .Values.secret.githubToken }}
  GITHUB_TOKEN: {{ .Values.secret.githubToken | b64enc | quote }}
  {{- end }}
{{- end }}
