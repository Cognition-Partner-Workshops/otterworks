# XcodeGen spec — optional fallback for regenerating OtterWorks.xcodeproj.
#
# The committed OtterWorks.xcodeproj is the source of truth and opens directly in
# Xcode 16+. This spec lets you regenerate it (e.g. on older Xcode, or to resolve
# a merge conflict in project.pbxproj) with:
#
#     brew install xcodegen   # once
#     cd clients/ios && xcodegen generate
#
name: OtterWorks
options:
  bundleIdPrefix: com.otterworks
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  OtterWorks:
    type: application
    platform: iOS
    sources:
      - OtterWorks
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.otterworks.ios
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: OtterWorks/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
